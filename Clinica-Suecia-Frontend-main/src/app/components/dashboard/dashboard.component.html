<div class="dashboard-wrapper">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark mb-0">Panel de Control</h3>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-12 col-md-4">
      <div class="top-card card-teal">
        <div class="card-info">
          <p class="card-title">Citas de Hoy</p>
          <h2 class="card-value">{{ kpis.citasDeHoy }}</h2>
        </div>
        <div class="card-icon">
          <i class="fa-solid fa-calendar-check"></i>
        </div>
      </div>
    </div>
    
    <div class="col-12 col-md-4">
      <div class="top-card card-olive">
        <div class="card-info">
          <p class="card-title">Total Pacientes</p>
          <h2 class="card-value">{{ kpis.totalPacientes }}</h2>
        </div>
        <div class="card-icon">
          <i class="fa-solid fa-hospital-user"></i>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="top-card card-purple">
        <div class="card-info">
          <p class="card-title">Médicos Activos</p>
          <h2 class="card-value">{{ kpis.totalMedicos }}</h2>
        </div>
        <div class="card-icon">
          <i class="fa-solid fa-user-doctor"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    
    <div class="col-12 col-lg-7">
      <div class="chart-container">
        <div class="chart-header">
          <h6 class="fw-bold mb-0">Top 5 Medicamentos</h6>
          <small class="text-muted">Más recetados este mes</small>
        </div>
        <div class="chart-body">
          <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="'bar'"></canvas>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-5">
      <div class="chart-container">
        <div class="chart-header">
          <h6 class="fw-bold mb-0">Tasa de Asistencia</h6>
          <small class="text-muted">Estado global de citas</small>
        </div>
        <div class="chart-body">
          <canvas baseChart [data]="doughnutChartData" [options]="doughnutChartOptions" [type]="'doughnut'"></canvas>
        </div>
      </div>
    </div>

  </div>
  
</div>
